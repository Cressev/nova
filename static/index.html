<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nova</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="%2318212f"/><text x="32" y="41" font-size="30" font-family="Arial" font-weight="700" text-anchor="middle" fill="white">N</text></svg>' />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">N</div>
          <div>
            <h1>Nova</h1>
            <p>个人开发 Agent</p>
          </div>
        </div>

        <button id="new-chat" class="new-chat" type="button">
          <span>+</span>
          新对话
        </button>

        <div class="section-label">最近对话</div>
        <nav id="session-list" class="session-list"></nav>
      </aside>

      <section class="main-panel">
        <header class="chat-header">
          <div>
            <div class="eyebrow">GLM-4.7 / LOCAL GATEWAY</div>
            <h2 id="chat-title">Nova Chat</h2>
          </div>
          <div class="header-actions">
            <span id="provider" class="pill">模型检查中</span>
            <span id="health" class="pill">网关检查中</span>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <form id="chat-form" class="composer">
          <div class="composer-status">
            <span id="stream-state">准备就绪</span>
          </div>
          <textarea
            id="message"
            name="message"
            rows="1"
            placeholder="和 Nova 对话，让它帮你读代码、拆任务、解释实现..."
            required
          ></textarea>
          <button id="send-button" type="submit">
            <span class="send-label">发送</span>
            <span class="send-icon">→</span>
          </button>
        </form>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
