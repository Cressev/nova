<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nova</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">N</div>
          <div>
            <h1>Nova</h1>
            <p>Local Agent</p>
          </div>
        </div>

        <button id="new-chat" class="new-chat" type="button">新对话</button>

        <div class="section-label">最近对话</div>
        <nav id="session-list" class="session-list"></nav>
      </aside>

      <section class="main-panel">
        <header class="chat-header">
          <div>
            <div class="eyebrow">GLM-4.7</div>
            <h2 id="chat-title">Nova Chat</h2>
          </div>
          <div class="header-actions">
            <span id="provider" class="pill">模型检查中</span>
            <span id="health" class="pill">网关检查中</span>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <form id="chat-form" class="composer">
          <textarea
            id="message"
            name="message"
            rows="1"
            placeholder="和 Nova 对话，让它帮你读代码、拆任务、解释实现..."
            required
          ></textarea>
          <button id="send-button" type="submit">发送</button>
        </form>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
